{% extends "vendor_portal/base.html" %}

{% block content %}
<section class="surface-panel form-shell">
    <div class="section-heading">
        <h3 class="section-title">Forgot Password</h3>
        <p class="section-copy">Submit your email or mobile number. The portal prepares an OTP reset request for your account.</p>
    </div>
    <form method="post" class="d-grid gap-3">
        {% csrf_token %}
        {% for field in form %}
        <div><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}</div>
        {% endfor %}
        <button class="btn btn-primary" type="submit">Request OTP</button>
    </form>
    <div class="mt-3">
        <a href="{% url 'vendor-portal-reset-password' %}">Already have the OTP? Reset password here.</a>
    </div>
</section>
{% endblock %}
