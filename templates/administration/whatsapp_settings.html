{% extends "base.html" %}

{% block content %}
<div class="row g-4">
    <div class="col-xl-6">
        <section class="surface-panel form-shell">
            <div class="section-heading"><h3 class="section-title">WhatsApp API Settings</h3></div>
            <form method="post" class="d-grid gap-3">
                {% csrf_token %}
                <input type="hidden" name="action" value="save">
                {% for field in whatsapp_form %}
                <div><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}</div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Save WhatsApp Settings</button>
            </form>
        </section>
    </div>
    <div class="col-xl-6">
        <section class="surface-panel form-shell">
            <div class="section-heading"><h3 class="section-title">Test WhatsApp Message</h3></div>
            <form method="post" class="d-grid gap-3">
                {% csrf_token %}
                <input type="hidden" name="action" value="test">
                {% for field in test_form %}
                <div><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}</div>
                {% endfor %}
                <button type="submit" class="btn btn-outline-primary">Log Test Message</button>
            </form>
        </section>
    </div>
</div>
{% endblock %}
