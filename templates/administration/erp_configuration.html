{% extends "base.html" %}

{% block content %}
<section class="surface-panel form-shell">
    <div class="section-heading">
        <h3 class="section-title">ERP Configuration</h3>
        <p class="section-copy">Maintain financial year, numbering rules, currency defaults, and tax/GST configuration centrally.</p>
    </div>
    <form method="post" class="d-grid gap-3">
        {% csrf_token %}
        {% for field in erp_form %}
        <div><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}</div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save ERP Configuration</button>
    </form>
</section>
{% endblock %}
