{% extends "base.html" %}

{% block content %}
<section class="surface-panel form-shell">
    <div class="section-heading">
        <h3 class="section-title">Company Settings</h3>
        <p class="section-copy">Manage legal identity, branding files, bank details, signatory assets, and contact information.</p>
    </div>
    <form method="post" enctype="multipart/form-data" class="d-grid gap-3">
        {% csrf_token %}
        {% for field in company_form %}
        <div><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}</div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save Company Settings</button>
    </form>
</section>
{% endblock %}
