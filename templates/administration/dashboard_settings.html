{% extends "base.html" %}

{% block content %}
<section class="surface-panel form-shell">
    <div class="section-heading">
        <h3 class="section-title">Dashboard Settings</h3>
        <p class="section-copy">Store widget visibility, quick links, custom layouts, and module visibility rules.</p>
    </div>
    <form method="post" class="d-grid gap-3">
        {% csrf_token %}
        {% for field in dashboard_form %}
        <div><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}</div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save Dashboard Settings</button>
    </form>
</section>
{% endblock %}
