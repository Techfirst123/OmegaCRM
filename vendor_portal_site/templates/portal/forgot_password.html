{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Support - {{ portal_brand_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="{% static 'css/custom.css' %}?v={% now "U" %}" rel="stylesheet">
</head>
<body class="portal-login-body">
    <main class="portal-login-shell">
        <section class="portal-login-card">
            <div class="mb-4">
                <p class="hero-kicker">{{ portal_brand_name }}</p>
                <h1 class="page-title mb-2">Password Support</h1>
                <p class="section-copy mb-0">Please contact the Omega team to reset vendor portal credentials, or use the ERP-side vendor portal control to issue a new OTP and password.</p>
                <div class="small text-muted mt-3">Support: {{ portal_support_email }}</div>
            </div>
            <a class="btn btn-outline-primary" href="{% url 'portal-login' %}">Back to Login</a>
        </section>
    </main>
</body>
</html>
