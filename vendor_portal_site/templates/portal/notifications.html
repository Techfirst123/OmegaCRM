{% extends "portal/base.html" %}

{% block content %}
<section class="surface-panel">
    <div class="section-heading"><h3 class="section-title">Notifications</h3></div>
    <div class="table-responsive">
        <table class="table procurement-table align-middle">
            <thead><tr><th>Title</th><th>Message</th><th>Channel</th><th>Status</th><th>Time</th></tr></thead>
            <tbody>
                {% for row in notification_rows %}
                <tr>
                    <td>{{ row.title }}</td>
                    <td>{{ row.message }}</td>
                    <td>{{ row.channel_label }}</td>
                    <td>{{ row.status_label }}</td>
                    <td>{{ row.created_at }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="5" class="text-center py-4 text-muted">No notifications yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
